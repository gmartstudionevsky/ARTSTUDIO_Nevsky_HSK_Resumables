name: Staging Migrate

on:
  workflow_dispatch:

jobs:
  staging-migrate:
    runs-on: ubuntu-latest
    env:
      DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET }}
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node -e "const u=new URL(process.env.DIRECT_URL); console.log('DIRECT host',u.hostname,'port',u.port)"
      - run: npx prisma migrate deploy
      - run: npm run seed:staging
