name: Bootstrap Admin (one-time)

on:
  workflow_dispatch:

jobs:
  bootstrap-admin:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DIRECT_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SEED_ADMIN_LOGIN: ${{ secrets.SEED_ADMIN_LOGIN }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run seed:bootstrap-admin
