name: Daily Telegram Digest

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest endpoint
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.APP_URL }}/api/jobs/digest" \
            -H "x-job-secret: ${{ secrets.JOB_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}'
